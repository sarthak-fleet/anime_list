name: Deploy anime_list to Cloudflare Pages
on:
  push:
    branches: [main]
    paths: ['.github/workflows/deploy.yml', 'src/**', 'components/**', 'lib/**', 'index.html', 'vite.config.*', 'package.json', 'pnpm-lock.yaml', 'wrangler.toml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
        env:
          # VITE_* values are inlined into the client bundle at build time via
          # import.meta.env. wrangler.toml [vars] only applies at runtime to the
          # worker, so the client would otherwise see these as undefined.
          VITE_API_URL: https://mal-api.sarthakagrawal927.workers.dev
          VITE_GOOGLE_CLIENT_ID: 207924374505-0mur9a99sal0ckob0vt38pcdj360ond5.apps.googleusercontent.com
          VITE_SAASMAKER_API_KEY: pk_fb1fe870205272a447298bfac32122383426d6a1c1fb10ab
      - id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=anime-list --branch=main --commit-dirty=true
      - name: Smoke production
        run: |
          set -euo pipefail
          for path in / /anime/1; do
            curl --fail --retry 5 --retry-delay 5 --max-time 20 "https://anime-list-9lk.pages.dev${path}" >/dev/null
          done
